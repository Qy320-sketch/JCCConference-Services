<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2025年东北分公司总结会</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --error: #ef4444;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "PingFang SC", sans-serif; }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-attachment: fixed;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 380px;
            padding: 40px 24px 60px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            position: relative;
            display: none;
        }

        .card-logo {
            position: absolute;
            bottom: 20px;
            right: 24px;
            max-width: 60px;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1));
            opacity: 0.8;
        }

        .hero-section { margin-bottom: 30px; }

        .hero-main-img {
            width: 90%;
            height: auto;
            margin: 0 auto 15px;
            display: block;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        .hero-subtitle {
            color: var(--text-main);
            font-size: 15px;
            margin-bottom: 10px;
            font-weight: 800;
            display: block;
        }

        .hero-label {
            color: var(--primary);
            letter-spacing: 3px;
            font-size: 13px;
            font-weight: 700;
            display: block;
        }

        input {
            display: block;
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border: 2.5px solid #f1f5f9;
            border-radius: 16px;
            outline: none;
            background: #f8fafc;
            margin-bottom: 15px;
            text-align: center;
            transition: all 0.3s;
        }
        input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        button {
            display: block;
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(37,99,235,0.4);
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        button:active { transform: scale(0.96); }

        .welcome-msg {
            color: var(--text-sub);
            font-size: 16px;
            margin-top: 10px;
            margin-bottom: 30px;
        }
        #resNameBold {
            color: var(--text-main);
            font-weight: 900;
            font-size: 24px;
            margin: 0 2px;
            border-bottom: 2px solid var(--primary);
        }

        .seat-info-box {
            background: #f0fdf4;
            padding: 35px 15px;
            border-radius: 24px;
            margin-bottom: 30px;
            border: 1px solid #dcfce7;
            display: block;
        }
        .seat-label {
            font-size: 16px;
            color: #15803d;
            display: block;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .seat-num { font-size: 52px; font-weight: 900; color: var(--success); display: block; letter-spacing: 2px; }

        .btn-schedule { background: var(--text-main); }

        .schedule-list { text-align: left; margin: 25px 0; }
        .schedule-item { display: flex; padding: 14px 0; border-bottom: 1px dashed rgba(0,0,0,0.1); }
        .time { font-weight: 800; color: var(--primary); min-width: 95px; font-size: 14px; }
        .event { color: var(--text-main); font-size: 14px; font-weight: 500; }

        .error-msg { color: var(--error); font-size: 13px; margin-bottom: 15px; display: none; font-weight: 600; }
        .reset-link { margin-top: 20px; font-size: 13px; color: var(--primary); cursor: pointer; text-decoration: underline; display: inline-block; font-weight: 600; }

        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

            <span class="hero-subtitle">2025年东北分公司总结会</span>
            <span class="hero-label">签到确认 · SIGN IN</span>
        </div>

        <div style="margin-top: 10px;">

        <span class="reset-link" onclick="showPage('signinPage')">返回重新签到</span>
        <img src="logo.png" alt="Logo" class="card-logo">
    </div>

        <button onclick="showPage('resultPage')">返回个人信息</button>
        <img src="logo.png" alt="Logo" class="card-logo">

        function showPage(pageId) {
            document.querySelectorAll('.card').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
        }

        function handleSignin() {
            const input = document.getElementById('nameInput');
            const name = input.value.trim();
            const error = document.getElementById('errorMsg');

            if (seatData[name]) {
                document.getElementById('resNameBold').innerText = name;
                document.getElementById('resSeat').innerText = seatData[name];
                error.style.display = 'none';
                showPage('resultPage');
            } else {
                if (name === "") {
                    alert("请输入姓名");
                } else {
                    error.style.display = 'block';
                }
            }
        }

            if (e.key === 'Enter') handleSignin();
