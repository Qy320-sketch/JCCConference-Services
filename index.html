<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2025年东北分公司总结会</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --error: #ef4444;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "PingFang SC", sans-serif; }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-attachment: fixed;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 380px;
            padding: 40px 24px 60px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            position: relative;
            display: none;
        }

        .card-logo {
            position: absolute;
            bottom: 20px;
            right: 24px;
            max-width: 60px;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1));
            opacity: 0.8;
        }

        .hero-section { margin-bottom: 30px; }
        .hero-main-img { width: 90%; height: auto; margin: 0 auto 15px; display: block; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2)); }
        .hero-subtitle { color: var(--text-main); font-size: 15px; margin-bottom: 10px; font-weight: 800; display: block; }
        .hero-label { color: var(--primary); letter-spacing: 3px; font-size: 13px; font-weight: 700; display: block; }

        input {
            display: block; width: 100%; padding: 16px; font-size: 16px; border: 2.5px solid #f1f5f9;
            border-radius: 16px; outline: none; background: #f8fafc; margin-bottom: 15px; text-align: center;
        }

        button {
            display: block; width: 100%; padding: 16px; background: var(--primary); color: white;
            font-size: 18px; font-weight: 700; border: none; border-radius: 16px; cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(37,99,235,0.4); margin-bottom: 12px;
        }

        .welcome-msg { color: var(--text-sub); font-size: 16px; margin-top: 10px; margin-bottom: 30px; }
        #resNameBold { color: var(--text-main); font-weight: 900; font-size: 22px; }

        .seat-info-box { background: #f0fdf4; padding: 30px 15px; border-radius: 20px; margin-bottom: 30px; border: 1px solid #dcfce7; }
        .seat-label { font-size: 15px; color: #15803d; display: block; margin-bottom: 15px; font-weight: 700; }
        .seat-num { font-size: 46px; font-weight: 900; color: var(--success); display: block; }

        .status-tip { font-size: 12px; color: var(--text-sub); margin-bottom: 10px; }
        .error-msg { color: var(--error); font-size: 13px; margin-bottom: 15px; display: none; font-weight: 600; }
    </style>
</head>
<body>

    <div id="signinPage" class="card" style="display: block;">
        <div class="hero-section">
            <img src="main_title.png" alt="主标题" class="hero-main-img">
            <span class="hero-subtitle">2025年东北分公司总结会</span>
            <span class="hero-label">签到确认 · SIGN IN</span>
        </div>

        <div id="status" class="status-tip">正在同步名单...</div>

        <div style="margin-top: 10px;">
            <input type="text" id="nameInput" placeholder="请输入姓名进行签到" autocomplete="off">
            <div id="errorMsg" class="error-msg">未找到名单信息，请重试</div>
            <button id="signBtn" onclick="handleSignin()" disabled style="opacity:0.5">加载中...</button>
        </div>
        <img src="logo.png" alt="Logo" class="card-logo">
    </div>

    <div id="resultPage" class="card">
        <p class="welcome-msg">欢迎您来，<span id="resNameBold">--</span></p>
        <div class="seat-info-box">
            <span class="seat-label">您的会议座次</span>
            <span class="seat-num" id="resSeat">--</span>
        </div>
        <button style="background: var(--text-main);" onclick="location.reload()">返回</button>
        <img src="logo.png" alt="Logo" class="card-logo">
    </div>

    <script>
        let seatData = {};

        // 核心逻辑：读取 CSV 文本文件
        window.onload = function() {
            fetch('list.csv')
                .then(response => {
                    if (!response.ok) throw new Error('未找到 list.csv');
                    return response.text();
                })
                .then(csvText => {
                    // 解析 CSV 文本
                    const rows = csvText.split('\n');
                    rows.forEach((row, i) => {
                        if (i === 0 || !row.trim()) return; // 跳过表头和空行
                        const cols = row.split(',');
                        if (cols.length >= 2) {
                            const name = cols[0].trim();
                            const seat = cols[1].trim();
                            seatData[name] = seat;
                        }
                    });
                    // 成功后激活按钮
                    document.getElementById('status').innerText = "✅ 名单同步完成";
                    const btn = document.getElementById('signBtn');
                    btn.disabled = false;
                    btn.style.opacity = "1";
                    btn.innerText = "立即签到";
                })
                .catch(err => {
                    document.getElementById('status').innerText = "❌ 加载失败: " + err.message;
                });
        };

        function handleSignin() {
            const name = document.getElementById('nameInput').value.trim();
            const error = document.getElementById('errorMsg');
            if (seatData[name]) {
                document.getElementById('resNameBold').innerText = name;
                document.getElementById('resSeat').innerText = seatData[name];
                document.getElementById('signinPage').style.display = 'none';
                document.getElementById('resultPage').style.display = 'block';
            } else {
                error.style.display = 'block';
            }
        }
    </script>
</body>
</html>
