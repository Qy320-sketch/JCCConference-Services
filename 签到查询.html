        body { background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        .title { text-align: center; font-size: 22px; font-weight: bold; color: #1a1a1a; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        input { width: 100%; padding: 14px; font-size: 16px; border: 1.5px solid #d9d9d9; border-radius: 8px; outline: none; transition: all 0.3s; }
        input:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }
        button { width: 100%; padding: 14px; background: #1890ff; color: white; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: background 0.3s; }
        button:active { background: #096dd9; }
        .result-box { margin-top: 25px; padding: 20px; border-radius: 8px; background: #f6ffed; border: 1px solid #b7eb8f; display: none; text-align: center; }
        .result-text { font-size: 18px; color: #333; line-height: 1.6; }
        .seat-num { display: block; font-size: 28px; color: #52c41a; font-weight: bold; margin-top: 8px; }
        .error-box { margin-top: 15px; color: #ff4d4f; font-size: 14px; text-align: center; display: none; }
        .footer { margin-top: auto; padding: 20px; color: #8c8c8c; font-size: 12px; text-align: center; }
    </style>
</head>

            尊敬的 <span id="resName" style="font-weight:bold;"></span>，您的位置：
            <span id="resSeat" class="seat-num"></span>

        const resSeat = document.getElementById('resSeat');
        
        const name = nameInput.value.trim();
        
        // 隐藏之前的结果
        errorBox.style.display = 'none';
        resultBox.style.display = 'none';
        
        if (!name) return;

        if (seatData[name]) {
            resName.innerText = name;
            resSeat.innerText = seatData[name];
            resultBox.style.display = 'block';
        } else {
            errorBox.style.display = 'block';
        }
    }

    // 监听回车键
